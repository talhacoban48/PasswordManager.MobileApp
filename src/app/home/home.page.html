<ion-header>
  <ion-toolbar>
    <ion-title>Apps / Sites</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="togglePassive()" [color]="showPassive ? 'primary' : 'medium'" fill="clear" title="Toggle passive entries">
        <ion-icon name="eye-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="openSettings()" fill="clear" color="medium">
        <ion-icon name="settings-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="logout()" fill="clear" color="medium">
        <ion-icon name="lock-closed-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      [(ngModel)]="searchTerm"
      (ionInput)="onSearchChange($event)"
      placeholder="Search..."
      animated="true"
      show-clear-button="focus"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list lines="none">
    @for (entry of filteredEntries; track entry.appname) {
      <ion-item
        button
        detail="true"
        (click)="openEntry(entry.appname)"
        [class.passive-item]="isPassive(entry)"
      >
        <ion-icon name="key-outline" slot="start" [color]="isPassive(entry) ? 'medium' : 'primary'"></ion-icon>
        <ion-label>
          <h2 [class.passive-text]="isPassive(entry)">{{ entry.appname }}</h2>
          @if (isPassive(entry)) { <p>Passive</p> }
        </ion-label>
      </ion-item>
    }
  </ion-list>

  @if (filteredEntries.length === 0) {
    <div class="empty-state">
      <ion-icon name="shield-outline"></ion-icon>
      <p>{{ searchTerm ? 'No results found.' : 'No entries yet.\nTap + to add one.' }}</p>
    </div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addNew()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
